<svg width="980" height="180" viewBox="0 0 980 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NUOQI_P dynamic status card</title>
  <desc id="desc">A cute animated game developer status card.</desc>
  <defs>
    <style>
      .scan { stroke-dasharray: 36 20; animation: scan 8s linear infinite; }
      .float { animation: float 3.4s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 2.2s ease-in-out infinite; transform-origin: center; }
      .bar1 { animation: bar1 4.4s ease-in-out infinite; transform-origin: left; }
      .bar2 { animation: bar2 5s ease-in-out infinite; transform-origin: left; }
      .bar3 { animation: bar3 5.6s ease-in-out infinite; transform-origin: left; }
      @keyframes scan { to { stroke-dashoffset: -180; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: .72; } 50% { transform: scale(1.08); opacity: 1; } }
      @keyframes bar1 { 0%,100% { transform: scaleX(.82); } 50% { transform: scaleX(.97); } }
      @keyframes bar2 { 0%,100% { transform: scaleX(.68); } 50% { transform: scaleX(.9); } }
      @keyframes bar3 { 0%,100% { transform: scaleX(.76); } 50% { transform: scaleX(1); } }
    </style>
    <linearGradient id="border" x1="42" y1="22" x2="938" y2="158" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF57D8"/>
      <stop offset="0.5" stop-color="#FFE680"/>
      <stop offset="1" stop-color="#20E7FF"/>
    </linearGradient>
    <linearGradient id="fill" x1="58" y1="32" x2="922" y2="150" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20123D"/>
      <stop offset="1" stop-color="#072434"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-40%" width="120%" height="180%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>
  <rect x="42" y="22" width="896" height="136" rx="26" fill="url(#fill)" stroke="url(#border)" stroke-width="2.5"/>
  <path class="scan" d="M68 52H912" stroke="url(#border)" stroke-width="2" stroke-linecap="round" opacity="0.48"/>

  <g class="float">
    <path d="M108 70C99 62 84 68 84 82C84 97 101 104 108 116C115 104 132 97 132 82C132 68 117 62 108 70Z" fill="#FF70D9"/>
    <path d="M160 60L167 75L184 77L171 88L175 105L160 96L145 105L149 88L136 77L153 75L160 60Z" fill="#FFE680"/>
  </g>

  <text x="224" y="66" fill="#F8F7FF" font-family="Segoe UI, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="850">当前状态：游戏开发中</text>
  <text x="224" y="100" fill="#CFE6FF" font-family="Consolas, Menlo, Microsoft YaHei, monospace" font-size="16" font-weight="700">Building mods, playful tools, and anime-flavored systems.</text>

  <g transform="translate(224 118)">
    <rect x="0" y="0" width="190" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.13"/>
    <rect class="bar1" x="0" y="0" width="190" height="12" rx="6" fill="#FF70D9"/>
    <text x="0" y="32" fill="#FFB7EA" font-family="Consolas, Menlo, monospace" font-size="13" font-weight="800">CREATIVITY</text>
  </g>
  <g transform="translate(478 118)">
    <rect x="0" y="0" width="190" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.13"/>
    <rect class="bar2" x="0" y="0" width="190" height="12" rx="6" fill="#20E7FF"/>
    <text x="0" y="32" fill="#B9F7FF" font-family="Consolas, Menlo, monospace" font-size="13" font-weight="800">SYSTEMS</text>
  </g>
  <g transform="translate(732 118)">
    <rect x="0" y="0" width="120" height="12" rx="6" fill="#FFFFFF" fill-opacity="0.13"/>
    <rect class="bar3" x="0" y="0" width="120" height="12" rx="6" fill="#FFE680"/>
    <text x="0" y="32" fill="#FFF0A3" font-family="Consolas, Menlo, monospace" font-size="13" font-weight="800">POLISH</text>
  </g>

  <g class="pulse" transform="translate(848 55)">
    <path d="M35 0L44 22L68 24L50 40L55 64L35 51L15 64L20 40L2 24L26 22L35 0Z" fill="#20E7FF"/>
    <path d="M35 18L40 30L53 32L43 40L46 53L35 46L24 53L27 40L17 32L30 30L35 18Z" fill="#F8F7FF"/>
  </g>
</svg>
