<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NUOQI_P 扁平高级风格主页横幅 v5</title>
  <desc id="desc">一个扁平、对称、低噪音的二次元游戏开发者主页横幅。</desc>
  <defs>
    <style>
      .breathe { animation: breathe 5.6s ease-in-out infinite; }
      .breathe-slow { animation: breathe 7s ease-in-out infinite; }
      @keyframes breathe { 0%,100% { opacity: .84; } 50% { opacity: 1; } }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
