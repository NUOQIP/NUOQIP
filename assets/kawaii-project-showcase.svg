<svg width="1080" height="300" viewBox="0 0 1080 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NUOQI_P project showcase</title>
  <desc id="desc">A cute cyber anime project showcase for RimTalk StyleExpand and DIY the Spire.</desc>
  <defs>
    <style>
      .float { animation: float 3.4s ease-in-out infinite; transform-origin: center; }
      .float2 { animation: float2 4.2s ease-in-out infinite; transform-origin: center; }
      .dash { stroke-dasharray: 18 14; animation: dash 8s linear infinite; }
      .twinkle { animation: twinkle 1.8s ease-in-out infinite; transform-origin: center; }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes float2 { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(6px) rotate(4deg); } }
      @keyframes dash { to { stroke-dashoffset: -128; } }
      @keyframes twinkle { 0%,100% { opacity: .45; transform: scale(.9); } 50% { opacity: 1; transform: scale(1.12); } }
    </style>
    <linearGradient id="bg" x1="24" y1="30" x2="1056" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#20123D"/>
      <stop offset="1" stop-color="#072434"/>
    </linearGradient>
    <linearGradient id="neon" x1="40" y1="42" x2="1040" y2="258" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF57D8"/>
      <stop offset="0.52" stop-color="#FFE680"/>
      <stop offset="1" stop-color="#20E7FF"/>
    </linearGradient>
    <filter id="glow" x="-12%" y="-30%" width="124%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect x="24" y="30" width="1032" height="240" rx="28" fill="url(#bg)" stroke="url(#neon)" stroke-width="2.5"/>
  <path class="dash" d="M62 72H1018" stroke="url(#neon)" stroke-width="2" stroke-linecap="round" opacity="0.45"/>
  <path class="dash" d="M62 238H1018" stroke="url(#neon)" stroke-width="2" stroke-linecap="round" opacity="0.32"/>

  <g transform="translate(72 88)">
    <rect width="430" height="130" rx="22" fill="#100F1E" fill-opacity="0.72" stroke="#FF70D9" stroke-opacity="0.65"/>
    <g class="float" filter="url(#glow)">
      <path d="M54 34C45 26 30 32 30 46C30 61 47 68 54 80C61 68 78 61 78 46C78 32 63 26 54 34Z" fill="#FF70D9"/>
      <path d="M104 22L111 37L128 39L115 50L119 67L104 58L89 67L93 50L80 39L97 37L104 22Z" fill="#FFE680"/>
    </g>
    <text x="150" y="48" fill="#F8F7FF" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="850">RimTalk StyleExpand</text>
    <text x="150" y="82" fill="#D9E6FF" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="17" font-weight="650">对话文风扩展 / 向量检索</text>
    <text x="150" y="112" fill="#FFB7EA" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="800">C# · RimWorld · Style System</text>
  </g>

  <g transform="translate(578 88)">
    <rect width="430" height="130" rx="22" fill="#100F1E" fill-opacity="0.72" stroke="#20E7FF" stroke-opacity="0.65"/>
    <g class="float2" filter="url(#glow)">
      <rect x="30" y="36" width="78" height="58" rx="14" fill="#F8F7FF"/>
      <path d="M45 56H63M54 47V65" stroke="#100F1E" stroke-width="6" stroke-linecap="round"/>
      <circle cx="82" cy="56" r="7" fill="#20E7FF"/>
      <circle cx="96" cy="70" r="7" fill="#FF70D9"/>
      <path d="M69 74C59 65 45 72 45 85C45 98 62 106 69 116C76 106 93 98 93 85C93 72 79 65 69 74Z" fill="#FF70D9"/>
    </g>
    <text x="150" y="48" fill="#F8F7FF" font-family="Segoe UI, Microsoft YaHei, Arial, sans-serif" font-size="26" font-weight="850">DIY the Spire</text>
    <text x="150" y="82" fill="#D9E6FF" font-family="Microsoft YaHei, Segoe UI, Arial, sans-serif" font-size="17" font-weight="650">卡图自定义 / 卡包管理 / 即时切换</text>
    <text x="150" y="112" fill="#B9F7FF" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="800">Java · ModTheSpire · Card Art</text>
  </g>

  <path class="twinkle" d="M527 126L535 143L554 145L540 157L544 176L527 166L510 176L514 157L500 145L519 143L527 126Z" fill="#FFE680"/>
  <path class="twinkle" d="M1012 48L1018 61L1033 63L1022 73L1025 88L1012 80L999 88L1002 73L991 63L1006 61L1012 48Z" fill="#20E7FF"/>
  <path class="twinkle" d="M70 222L76 235L91 237L80 247L83 262L70 254L57 262L60 247L49 237L64 235L70 222Z" fill="#FF70D9"/>
</svg>
