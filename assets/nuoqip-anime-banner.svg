    <text x="328" y="218" fill="#FF8BD1" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700" letter-spacing="0">GAME DEVELOPER // MOD CREATOR</text>
    <text x="329" y="260" fill="#BFC7FF" font-family="Consolas, Menlo, monospace" font-size="21" font-weight="600" letter-spacing="0">C# . JAVA . GAME MODS . LLM TOOLS . ANIME UI</text>
  </g>

