<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NUOQI_P anime profile banner</title>
  <desc id="desc">A dark anime-inspired game developer banner with neon pink and cyan accents.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11101D"/>
      <stop offset="0.46" stop-color="#18122B"/>
      <stop offset="1" stop-color="#101A2E"/>
    </linearGradient>
    <linearGradient id="pinkCyan" x1="182" y1="71" x2="1098" y2="367" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8BD1"/>
      <stop offset="0.52" stop-color="#B692FF"/>
      <stop offset="1" stop-color="#8BE9FD"/>
    </linearGradient>
    <linearGradient id="panel" x1="140" y1="60" x2="1140" y2="366" gradientUnits="userSpaceOnUse">
      <stop stop-color="#211A35" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#101D2F" stop-opacity="0.86"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1 0 1 0 0 0.5 0 0 1 0 0.95 0 0 0 0.55 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-35%" width="120%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="420" rx="30" fill="url(#grid)"/>

  <circle cx="1088" cy="76" r="172" fill="#8BE9FD" opacity="0.1" filter="url(#softGlow)"/>
  <circle cx="168" cy="360" r="186" fill="#FF8BD1" opacity="0.13" filter="url(#softGlow)"/>

  <path d="M73 332C206 298 259 373 395 337C535 300 573 202 723 214C872 226 943 323 1192 262" stroke="url(#pinkCyan)" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M76 358C242 318 296 402 432 363C591 318 607 250 738 256C889 264 964 352 1206 291" stroke="#8BE9FD" stroke-width="1" stroke-opacity="0.32"/>

  <rect x="110" y="56" width="1060" height="308" rx="28" fill="url(#panel)" stroke="url(#pinkCyan)" stroke-width="2" opacity="0.98"/>
  <rect x="136" y="82" width="1008" height="256" rx="22" stroke="#FFFFFF" stroke-opacity="0.11"/>

