<svg width="980" height="150" viewBox="0 0 980 150" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NUOQI_P flat status card v6</title>
  <desc id="desc">一个扁平高级风格的状态卡片，只包含低频呼吸效果。</desc>
  <defs>
    <style>
      .breathe { animation: breathe 5.8s ease-in-out infinite; }
      .breathe-slow { animation: breathe 7s ease-in-out infinite; }
      @keyframes breathe { 0%,100% { opacity: .84; } 50% { opacity: 1; } }
    </style>
    <linearGradient id="border" x1="40" y1="22" x2="940" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5CCD"/>
      <stop offset="0.5" stop-color="#8F6CFF"/>
      <stop offset="1" stop-color="#25D7E8"/>
    </linearGradient>
    <linearGradient id="panel" x1="40" y1="22" x2="940" y2="128" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17122C"/>
      <stop offset="1" stop-color="#092231"/>
    </linearGradient>
  </defs>

  <rect x="40" y="22" width="900" height="106" rx="24" fill="url(#panel)" stroke="url(#border)" stroke-width="2.5"/>
  <rect x="66" y="48" width="6" height="54" rx="3" fill="#FF5CCD"/>
  <text x="96" y="70" fill="#F7F3FF" font-family="Segoe UI, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="24" font-weight="850">当前状态：游戏开发中</text>
  <text x="96" y="98" fill="#9FB5CF" font-family="Consolas, Menlo, Microsoft YaHei, monospace" font-size="15" font-weight="700">Game Dev · Mod Lab · Anime Mod</text>

  <g transform="translate(548 55)">
    <rect width="250" height="9" rx="4.5" fill="#FFFFFF" opacity="0.13"/>
    <rect class="breathe" width="176" height="9" rx="4.5" fill="#FF5CCD"/>
    <rect y="30" width="250" height="9" rx="4.5" fill="#FFFFFF" opacity="0.13"/>
    <rect class="breathe-slow" y="30" width="214" height="9" rx="4.5" fill="#25D7E8"/>
  </g>

  <g class="breathe" transform="translate(842 52)">
    <rect width="52" height="52" rx="16" fill="#111827" stroke="#FFD76B" stroke-opacity="0.6"/>
    <path d="M26 14C20 8 10 12 10 22C10 33 22 38 26 46C30 38 42 33 42 22C42 12 32 8 26 14Z" fill="#FF5CCD"/>
  </g>
</svg>
