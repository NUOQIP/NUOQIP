<svg width="980" height="72" viewBox="0 0 980 72" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kawaii animated sparkle divider</title>
  <desc id="desc">A cute animated neon divider with hearts and stars.</desc>
  <defs>
    <style>
      .dash { stroke-dasharray: 20 16; animation: move 8s linear infinite; }
      .float { animation: float 3s ease-in-out infinite; transform-origin: center; }
      .float2 { animation: float2 3.8s ease-in-out infinite; transform-origin: center; }
      .twinkle { animation: twinkle 1.7s ease-in-out infinite; transform-origin: center; }
      @keyframes move { to { stroke-dashoffset: -144; } }
      @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
      @keyframes float2 { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(5px) rotate(7deg); } }
      @keyframes twinkle { 0%,100% { opacity: .38; transform: scale(.82); } 50% { opacity: 1; transform: scale(1.16); } }
    </style>
    <linearGradient id="line" x1="0" y1="36" x2="980" y2="36" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF57D8" stop-opacity="0"/>
      <stop offset="0.18" stop-color="#FF57D8"/>
      <stop offset="0.5" stop-color="#FFE680"/>
      <stop offset="0.82" stop-color="#20E7FF"/>
      <stop offset="1" stop-color="#20E7FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-10%" y="-80%" width="120%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>
  <path class="dash" d="M44 36H936" stroke="url(#line)" stroke-width="4" stroke-linecap="round" filter="url(#glow)"/>
  <path class="float" d="M134 20C126 13 113 18 113 29C113 41 128 47 134 56C140 47 155 41 155 29C155 18 142 13 134 20Z" fill="#FF70D9"/>
  <path class="twinkle" d="M270 14L277 28L293 30L281 41L284 57L270 49L256 57L259 41L247 30L263 28L270 14Z" fill="#FFE680"/>
  <path class="float2" d="M490 17L496 30L510 32L499 42L502 57L490 49L478 57L481 42L470 32L484 30L490 17Z" fill="#20E7FF"/>
  <path class="float" d="M704 20C696 13 683 18 683 29C683 41 698 47 704 56C710 47 725 41 725 29C725 18 712 13 704 20Z" fill="#FF70D9"/>
  <path class="twinkle" d="M842 14L849 28L865 30L853 41L856 57L842 49L828 57L831 41L819 30L835 28L842 14Z" fill="#FFE680"/>
</svg>
