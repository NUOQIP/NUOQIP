<svg width="980" height="56" viewBox="0 0 980 56" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flat premium divider v3</title>
  <desc id="desc">一条对称、扁平、低频呼吸的霓虹分割线。</desc>
  <defs>
    <style>
      .breathe { animation: breathe 6s ease-in-out infinite; }
      @keyframes breathe { 0%,100% { opacity: .78; } 50% { opacity: 1; } }
    </style>
    <linearGradient id="line" x1="80" y1="28" x2="900" y2="28" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5CCD" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#FF5CCD"/>
      <stop offset="0.5" stop-color="#8F6CFF"/>
      <stop offset="0.8" stop-color="#25D7E8"/>
      <stop offset="1" stop-color="#25D7E8" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <path class="breathe" d="M80 28H900" stroke="url(#line)" stroke-width="2.5" stroke-linecap="round"/>
  <rect x="482" y="20" width="16" height="16" rx="4" fill="#111827" stroke="#FFD76B" stroke-width="2"/>
</svg>
