<svg width="1280" height="440" viewBox="0 0 1280 440" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">NUOQI_P 可爱赛博二次元游戏开发者横幅</title>
  <desc id="desc">一个带有可爱动态图标、心形手柄、闪烁星星和霓虹 HUD 的中文游戏开发者横幅。</desc>
  <defs>
    <style>
      .float-a { animation: floatA 3.8s ease-in-out infinite; transform-origin: center; }
      .float-b { animation: floatB 4.6s ease-in-out infinite; transform-origin: center; }
      .pulse { animation: pulse 2.4s ease-in-out infinite; transform-origin: center; }
      .twinkle { animation: twinkle 1.8s ease-in-out infinite; transform-origin: center; }
      .twinkle-slow { animation: twinkle 2.7s ease-in-out infinite; transform-origin: center; }
      .dash { stroke-dasharray: 18 14; animation: dash 7s linear infinite; }
      .blink { animation: blink 1.6s ease-in-out infinite; }
      @keyframes floatA { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
      @keyframes floatB { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(7px) rotate(5deg); } }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity: .82; } 50% { transform: scale(1.08); opacity: 1; } }
      @keyframes twinkle { 0%,100% { opacity: .38; transform: scale(.86); } 50% { opacity: 1; transform: scale(1.12); } }
      @keyframes dash { to { stroke-dashoffset: -128; } }
      @keyframes blink { 0%,100% { opacity: .45; } 50% { opacity: 1; } }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#090616"/>
      <stop offset="0.36" stop-color="#1A0D32"/>
      <stop offset="0.72" stop-color="#10153A"/>
      <stop offset="1" stop-color="#052333"/>
    </linearGradient>
    <linearGradient id="neon" x1="86" y1="56" x2="1198" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF57D8"/>
      <stop offset="0.46" stop-color="#9A6CFF"/>
      <stop offset="1" stop-color="#20E7FF"/>
    </linearGradient>
    <linearGradient id="soft" x1="128" y1="68" x2="1152" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2B164C" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#072235" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="candy" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFD6F6"/>
      <stop offset="0.48" stop-color="#FF70D9"/>
      <stop offset="1" stop-color="#20E7FF"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFE680"/>
      <stop offset="1" stop-color="#FF9E80"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 .95 0 1 0 0 .25 0 0 1 0 1 0 0 0 .78 0"/>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <filter id="textGlow" x="-10%" y="-35%" width="120%" height="170%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFFFFF" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="10" height="10" patternUnits="userSpaceOnUse">
      <path d="M0 0H10" stroke="#FFFFFF" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="440" rx="30" fill="url(#bg)"/>
  <rect width="1280" height="440" rx="30" fill="url(#grid)"/>
  <rect width="1280" height="440" rx="30" fill="url(#scan)"/>

  <g opacity="0.78" filter="url(#glow)">
    <circle cx="1000" cy="68" r="178" fill="#20E7FF" opacity="0.12"/>
    <circle cx="184" cy="374" r="228" fill="#FF57D8" opacity="0.17"/>
    <circle cx="660" cy="28" r="150" fill="#9A6CFF" opacity="0.11"/>
  </g>

  <rect x="78" y="54" width="1124" height="334" rx="32" fill="url(#soft)" stroke="url(#neon)" stroke-width="2.5"/>
  <rect x="106" y="82" width="1068" height="278" rx="24" stroke="#FFFFFF" stroke-opacity="0.13"/>
  <path class="dash" d="M92 356C244 330 308 410 460 374C606 350 650 338 793 340C944 346 1006 374 1218 322" stroke="url(#neon)" stroke-width="2" stroke-opacity="0.42"/>
  <path class="dash" d="M86 86H205" stroke="#FF57D8" stroke-width="3" stroke-linecap="round"/>
  <path class="dash" d="M1085 354H1190" stroke="#20E7FF" stroke-width="3" stroke-linecap="round"/>

  <g transform="translate(132 112)" filter="url(#glow)">
    <g class="float-a">
    <rect x="0" y="0" width="138" height="138" rx="34" fill="#120D27" stroke="url(#candy)" stroke-width="3"/>
    <path d="M39 61H99C110 61 119 70 119 81V88C119 103 106 115 91 112L80 110H58L47 112C32 115 19 103 19 88V81C19 70 28 61 39 61Z" fill="#F8F7FF"/>
    <path d="M44 50C50 35 88 35 94 50" stroke="#FF70D9" stroke-width="8" stroke-linecap="round"/>
    <path d="M46 76H62M54 68V84" stroke="#151022" stroke-width="6" stroke-linecap="round"/>
    <circle cx="86" cy="76" r="7" fill="#20E7FF"/>
    <circle cx="101" cy="88" r="7" fill="#FF70D9"/>
    <path class="pulse" d="M69 86C57 76 39 85 39 101C39 116 60 125 69 136C78 125 99 116 99 101C99 85 81 76 69 86Z" fill="url(#candy)"/>
    <path class="twinkle" d="M23 26L30 40L45 42L34 52L37 67L23 59L9 67L12 52L1 42L16 40L23 26Z" fill="#FFE680"/>
    <path class="twinkle-slow" d="M116 21L121 31L132 32L124 40L126 51L116 45L106 51L108 40L100 32L111 31L116 21Z" fill="#20E7FF"/>
    </g>
  </g>

  <g filter="url(#textGlow)">
    <text x="326" y="154" fill="#F8F7FF" font-family="Segoe UI, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="0">NUOQI_P</text>
    <text x="331" y="205" fill="#FF70D9" font-family="Segoe UI, Microsoft YaHei, Noto Sans CJK SC, Arial, sans-serif" font-size="30" font-weight="850" letter-spacing="0">中文游戏开发者 // 可爱赛博 Mod 工坊</text>
    <text x="333" y="247" fill="#D7E2FF" font-family="Consolas, Menlo, Microsoft YaHei, monospace" font-size="20" font-weight="700" letter-spacing="0">C# . Java . Game Systems . LLM Tools . Anime UI</text>
  </g>

  <g>
    <rect x="330" y="282" width="138" height="38" rx="19" fill="#FF57D8" fill-opacity="0.19" stroke="#FF70D9" stroke-opacity="0.68"/>
    <text x="354" y="307" fill="#F8F7FF" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="800">GAME DEV</text>
    <circle class="blink" cx="448" cy="301" r="7" fill="#20E7FF"/>

    <rect x="484" y="282" width="132" height="38" rx="19" fill="#20E7FF" fill-opacity="0.16" stroke="#20E7FF" stroke-opacity="0.62"/>
    <text x="509" y="307" fill="#F8F7FF" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="800">MOD LAB</text>

    <rect x="632" y="282" width="178" height="38" rx="19" fill="#FFE680" fill-opacity="0.16" stroke="#FFE680" stroke-opacity="0.62"/>
    <text x="657" y="307" fill="#F8F7FF" font-family="Consolas, Menlo, monospace" font-size="15" font-weight="800">KAWAII BUILD</text>
  </g>

  <g transform="translate(910 96)">
    <g class="float-b">
    <rect x="0" y="0" width="232" height="214" rx="22" fill="#FFFFFF" fill-opacity="0.07" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <rect x="20" y="20" width="192" height="40" rx="16" fill="#110D24" stroke="url(#neon)" stroke-opacity="0.45"/>
    <circle class="pulse" cx="45" cy="40" r="7" fill="#FF70D9"/>
    <circle class="pulse" cx="69" cy="40" r="7" fill="#20E7FF"/>
    <circle class="pulse" cx="93" cy="40" r="7" fill="#FFE680"/>
    <path class="twinkle" d="M160 15L170 36L193 38L176 53L181 76L160 64L139 76L144 53L127 38L150 36L160 15Z" fill="url(#gold)"/>
    <text x="24" y="91" fill="#20E7FF" font-family="Consolas, Menlo, monospace" font-size="13" font-weight="800">KAWAII HUD</text>
    <path d="M24 112H188" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="8" stroke-linecap="round"/>
    <path class="dash" d="M24 138H142" stroke="#FF70D9" stroke-opacity="0.75" stroke-width="8" stroke-linecap="round"/>
    <path class="dash" d="M24 164H174" stroke="#20E7FF" stroke-opacity="0.72" stroke-width="8" stroke-linecap="round"/>
    <path d="M28 187L38 176L48 187L58 172L70 188" stroke="#FFE680" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="82" y="191" fill="#F8F7FF" font-family="Consolas, Menlo, monospace" font-size="13" font-weight="800">READY</text>
    </g>
  </g>

  <g opacity="0.96">
    <path class="twinkle" d="M1160 314L1168 331L1187 333L1173 345L1177 364L1160 354L1143 364L1147 345L1133 333L1152 331L1160 314Z" fill="#20E7FF"/>
    <path class="float-a" d="M150 270C138 260 120 268 120 284C120 300 141 309 150 321C159 309 180 300 180 284C180 268 162 260 150 270Z" fill="#FF70D9"/>
    <path class="twinkle-slow" d="M1017 260L1022 270L1034 272L1025 280L1028 292L1017 286L1006 292L1009 280L1000 272L1012 270L1017 260Z" fill="#FFE680"/>
    <path class="twinkle" d="M279 83L284 94L296 96L287 104L290 116L279 109L268 116L271 104L262 96L274 94L279 83Z" fill="#20E7FF"/>
  </g>
</svg>
